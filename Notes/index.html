<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <section>
      <div id="conatiner">
        <div>
          <div id="titleMain">
            <label for="title">Title:</label>
            <input
              type="text"
              contenteditable="true"
              class="title"
              id="title"
            />
          </div>
          <textarea id="notes" rows="3" cols="10"></textarea>
        </div>

        <button id="btn">
          <i class="fa-solid fa-plus" style="color: rgb(9, 34, 26)"></i>
        </button>
      </div>

      <div id="lists"></div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
